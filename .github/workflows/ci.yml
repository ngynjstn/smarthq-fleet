name: CI

# Run on every push and on PRs targeting the default branch.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` installs from the lockfile and runs the `postinstall` hook,
      # which is `prisma generate` — that regenerates src/generated/prisma
      # (gitignored), so typecheck has the Prisma client available.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `npm run typecheck` runs `next typegen` first to emit next-env.d.ts
      # and route types (also gitignored), then `tsc --noEmit`.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
